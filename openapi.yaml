  /v2/wallet/secrets:
    post:
      x-audience: internal
      summary: Register a Wallet Secret
      description: |-
        Registers a Wallet Secret for a CDP Project. This secret is configured in the CDP Portal, and is used to authenticate requests to the EVM and Solana Account APIs.


        Wallet Secrets should be generated in the browser using the following JavaScript code. The private key should be returned to the developer, and the public key should be what is passed to this API.

        ```javascript
        window.crypto.subtle.generateKey(
          {
            name: "ECDSA",
            namedCurve: "P-256", // secp256r1
          },
          true, // Allow key export
          ["sign", "verify"] // Key usages
        ).then(keyPair => {
          return Promise.all([
            window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey),
            window.crypto.subtle.exportKey("spki", keyPair.publicKey)
          ]);
        }).then(([privateKeyBuffer, publicKeyBuffer]) => {
          const privateKeyBytes = new Uint8Array(privateKeyBuffer);
          const publicKeyBytes = new Uint8Array(publicKeyBuffer);

          // Safe way to convert large Uint8Arrays to strings
          const privateKeyBase64 = btoa(
            Array.from(privateKeyBytes)
              .map(byte => String.fromCharCode(byte))
              .join('')
          );

          const publicKeyBase64 = btoa(
            Array.from(publicKeyBytes)
              .map(byte => String.fromCharCode(byte))
              .join('')
          );

          console.log(privateKeyBase64);
          console.log(publicKeyBase64);

          return { privateKeyBase64, publicKeyBase64 };
        });
        ```

        This API is available only to the CDP Portal, and should not be exposed externally.
      operationId: registerWalletSecret
      tags:
        - Wallet Secrets (Internal)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                publicKey:
                  type: string
                  description: The base64 encoded public key of the Wallet Secret.
                  example: MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEaJ+Pk06OLqr05KFYrSopsF33nz8tymIDlLUq19cwmsGaZKkR6gOL1MZT6st6P2NkHOW6R+ZHFdCbymNQkmmLlA==
              required:
                - publicKey
      responses:
        '200':
          description: Successfully registered Wallet Secret.
        '409':
          description: Already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                already_exists:
                  value:
                    errorType: already_exists
                    errorMessage: Project already has a secret registered.
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
