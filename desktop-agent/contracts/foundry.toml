[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "aave-v3-core/=lib/aave-v3-core/",
]

[rpc_endpoints]
base = "${BASE_RPC_ENDPOINT}"
base_sepolia = "https://sepolia.base.org"
